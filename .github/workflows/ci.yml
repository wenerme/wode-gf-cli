name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Build And Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint And Build
        run: pnpm run check
