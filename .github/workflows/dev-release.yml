name: Dev Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Dev Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Prepare Release Files
        run: |
          mkdir -p release
          cp dist/wode-gf-cli.js release/wode-gf-cli.js
          cp README.md release/README.md
          cp README.zh-CN.md release/README.zh-CN.md
          (cd release && zip -r ../wode-gf-cli-dev.zip .)
          shasum -a 256 wode-gf-cli-dev.zip > wode-gf-cli-dev.zip.sha256

      - name: Update dev tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f dev
          git push origin refs/tags/dev --force

      - name: Publish Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Release
          prerelease: true
          generate_release_notes: false
          append_body: false
          fail_on_unmatched_files: true
          files: |
            wode-gf-cli-dev.zip
            wode-gf-cli-dev.zip.sha256
